apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    # Force redirect HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # ส่ง X-Forwarded-* headers ให้ Keycloak (ต้องคู่กับ KC_PROXY_HEADERS=xforwarded)
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.example.com   # TODO: เปลี่ยนเป็น hostname จริง
      secretName: keycloak-tls   # TODO: สร้าง cert-manager Certificate หรือ manual TLS secret
  rules:
    - host: keycloak.example.com   # TODO: เปลี่ยนเป็น hostname จริง
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
