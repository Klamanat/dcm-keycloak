apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi   # เพิ่มจาก 1Gi → 10Gi สำหรับ production
  # storageClassName: standard   # TODO: ระบุ StorageClass ที่ cluster ใช้ (gp2, gp3, standard ฯลฯ)
