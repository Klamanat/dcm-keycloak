replicaCount: 1

image:
  repository: registry.example.com/keycloak-dcm
  tag: latest
  pullPolicy: IfNotPresent

hostname: localhost
hostnameStrict: "false"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

ingress:
  hostname: keycloak.example.com
  tlsSecret: keycloak-tls

# ส่งผ่าน --set หรือ values-secret.yaml (gitignored)
secret:
  adminUser: ""
  adminPassword: ""
  dbUrl: ""
  dbUsername: ""
  dbPassword: ""
